services:
  app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: pcr_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pcr_prueba_tecnica}
      DB_USERNAME: ${DB_USERNAME:-pcr_user}
      DB_PASSWORD: ${DB_PASSWORD:-pcr_password}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pcr_network

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/node/Dockerfile
    container_name: pcr_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - pcr_frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - app
    networks:
      - pcr_network

  db:
    image: postgres:16-alpine
    container_name: pcr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pcr_prueba_tecnica}
      POSTGRES_USER: ${DB_USERNAME:-pcr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pcr_password}
    ports:
      - "${DB_FORWARD_PORT:-5433}:5432"
    volumes:
      - pcr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pcr_user} -d ${DB_DATABASE:-pcr_prueba_tecnica}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pcr_network

networks:
  pcr_network:
    driver: bridge

volumes:
  pcr_pgdata:
    driver: local
  pcr_frontend_node_modules:
    driver: local
